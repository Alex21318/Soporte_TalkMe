<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>TalkMe — Cargando</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-app-region: drag;
    }
    .splash-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      border-radius: 20px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
      animation: splashIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    /* Capa decorativa con color del tema */
    .splash-container::before {
      content: '';
      position: absolute;
      top: -30%; left: -30%;
      width: 160%; height: 160%;
      background:
        radial-gradient(circle at 30% 30%, rgba(99, 102, 241, 0.35), transparent 55%),
        radial-gradient(circle at 70% 70%, rgba(168, 85, 247, 0.25), transparent 55%);
      filter: blur(20px);
      animation: rotate 18s linear infinite;
    }
    /* Patrón de puntos sutil */
    .splash-container::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 22px 22px;
      mask-image: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.6), transparent 70%);
      -webkit-mask-image: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.6), transparent 70%);
    }
    @keyframes splashIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    /* Logo con glow */
    .logo-wrap {
      position: relative;
      z-index: 2;
      width: 110px;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.85));
      border-radius: 24px;
      box-shadow:
        0 0 40px rgba(99, 102, 241, 0.45),
        0 15px 40px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
      animation: float 3s ease-in-out infinite;
    }
    .logo-wrap img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15));
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .titulo {
      position: relative;
      z-index: 2;
      margin-top: 22px;
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 2px 12px rgba(99, 102, 241, 0.45);
    }
    .titulo span {
      background: linear-gradient(135deg, #a5b4fc, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .subtitulo {
      position: relative;
      z-index: 2;
      margin-top: 6px;
      color: rgba(255, 255, 255, 0.65);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    /* Barra de progreso */
    .progress-wrap {
      position: relative;
      z-index: 2;
      margin-top: 30px;
      width: 240px;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(165, 180, 252, 0.9) 50%,
        transparent 100%);
      animation: slide 1.6s ease-in-out infinite;
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    .estado {
      position: relative;
      z-index: 2;
      margin-top: 14px;
      color: rgba(255, 255, 255, 0.55);
      font-size: 11px;
      letter-spacing: 0.5px;
      transition: opacity 0.3s ease;
    }
    .version {
      position: absolute;
      bottom: 16px;
      right: 20px;
      color: rgba(255, 255, 255, 0.3);
      font-size: 10px;
      z-index: 2;
      letter-spacing: 1px;
    }
    .brand-tag {
      position: absolute;
      bottom: 16px;
      left: 20px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 10px;
      z-index: 2;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="logo-wrap">
      <img src="../public/assets/new_logo_T.png" alt="TalkMe" />
    </div>
    <div class="titulo">Talk<span>Me</span></div>
    <div class="subtitulo">Plataforma de Soporte</div>
    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>
    <div class="estado" id="estado">Inicializando módulos...</div>
    <div class="brand-tag">Soporte</div>
    <div class="version">v1.0.0</div>
  </div>
  <script>
    // Mensajes rotativos en el estado
    const mensajes = [
      'Inicializando módulos...',
      'Cargando configuración...',
      'Conectando con el servidor...',
      'Preparando interfaz...',
      'Casi listo...'
    ];
    let i = 0;
    const $estado = document.getElementById('estado');
    setInterval(() => {
      i = (i + 1) % mensajes.length;
      $estado.style.opacity = '0';
      setTimeout(() => {
        $estado.textContent = mensajes[i];
        $estado.style.opacity = '1';
      }, 300);
    }, 1200);
  </script>
</body>
</html>
